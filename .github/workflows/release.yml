name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.1)'
        required: true
        default: '1.0.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v', ''
          } elseif ('${{ github.event.inputs.version }}' -ne '') {
            $v = '${{ github.event.inputs.version }}'
          } else {
            $v = '0.0.0'
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Building version: $v"

      - name: Publish app (self-contained)
        run: >
          dotnet publish NakTaWallpaper.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Version=${{ steps.ver.outputs.version }}
          -p:AssemblyVersion=${{ steps.ver.outputs.version }}.0
          -p:FileVersion=${{ steps.ver.outputs.version }}.0
          -o dist/NakTaWallpaper

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.ver.outputs.version }} `
            installer.iss

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem dist -File

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NakTaWallpaper-Setup-v${{ steps.ver.outputs.version }}.exe
          tag_name: ${{ github.ref_name }}
          name: NakTaWallpaper ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: NakTaWallpaper-Setup-v${{ steps.ver.outputs.version }}
          path: dist/NakTaWallpaper-Setup-v${{ steps.ver.outputs.version }}.exe
